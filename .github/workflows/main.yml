name: Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build frontend and all packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Ensure "bd-scheduler" is not in code changes
        run: |
          git fetch origin main
          git diff origin/main..HEAD -- . ':!.github/workflows' | grep -i "bd-scheduler" && echo "Found forbidden word: bd-scheduler" && exit 1 || echo "Check passed"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: db-scheduler-ui-frontend/package.json

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          cache: 'pnpm'
          cache-dependency-path: db-scheduler-ui-frontend/pnpm-lock.yaml

      - name: Install Node.js dependencies
        working-directory: db-scheduler-ui-frontend
        run: pnpm install --frozen-lockfile

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
            java-version: '17'
            distribution: 'temurin'

      - name: Build all packages with Maven
        run: mvn --batch-mode --update-snapshots package -DskipTests